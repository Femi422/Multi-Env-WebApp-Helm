<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Retail Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: 20px auto;
        }

        h2 {
            color: #333;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px #ccc;
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }

        .price {
            color: green;
            font-size: 18px;
            font-weight: bold;
        }

        button {
            background: #222;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #555;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>Urban Style Store</h1>
    <p>Shoes & Clothes Collection</p>
</header>

<div class="container">

    <h2>Shoes</h2>

    <div class="products">

        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Running+Shoes">
            <h3>Running Shoes</h3>
            <p class="price">$59.99</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Sneakers">
            <h3>Classic Sneakers</h3>
            <p class="price">$89.99</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Boots">
            <h3>Leather Boots</h3>
            <p class="price">$120.00</p>
            <button>Add to Cart</button>
        </div>

    </div>


    <h2>Clothes</h2>

    <div class="products">

        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=T-Shirt">
            <h3>Cotton T-Shirt</h3>
            <p class="price">$19.99</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Jeans">
            <h3>Blue Jeans</h3>
            <p class="price">$49.99</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Jacket">
            <h3>Winter Jacket</h3>
            <p class="price">$99.99</p>
            <button>Add to Cart</button>
        </div>

    </div>

</div>

<footer>
    © 2026 Urban Style Store
</footer>

</body>
</html>
